<div class="auth-card card">
  <h2>Register</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label>Full name</label>
      <input formControlName="full_name" />

      <div class="error" *ngIf="form.controls.full_name.touched && form.controls.full_name.errors">
        <span *ngIf="form.controls.full_name.errors['required']">
          Full name is required.
        </span>
        <span *ngIf="form.controls.full_name.errors['minlength']">
          Full name must be at least 3 characters.
        </span>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" />

      <div class="error" *ngIf="form.controls.email.touched && form.controls.email.errors">
        <span *ngIf="form.controls.email.errors['required']">
          Email is required.
        </span>
        <span *ngIf="form.controls.email.errors['email']">
          Enter a valid email.
        </span>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password" />

      <div class="error" *ngIf="form.controls.password.touched && form.controls.password.errors">
        <span *ngIf="form.controls.password.errors['required']">
          Password is required.
        </span>
        <span *ngIf="form.controls.password.errors['minlength']">
          Password must be at least 6 characters.
        </span>
      </div>
    </div>

    <div class="error" *ngIf="error">{{ error }}</div>

    <button class="btn btn-primary" type="submit">
      Create patient account
    </button>
  </form>

  <p class="small" style="margin-top: 1rem;">
    Already registered? <a routerLink="/login">Login</a>
  </p>
</div>
